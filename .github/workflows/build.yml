name: Code Quality Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kivy cython pylint flake8
      
      - name: Check Python syntax
        run: |
          echo "Checking Python syntax..."
          python -m py_compile main_kivy.py
          python -m py_compile db_manager.py
          python -m py_compile law_searcher.py
          python -m py_compile generate_html.py
          echo "✅ All Python files have valid syntax"
      
      - name: Run pylint
        continue-on-error: true
        run: |
          echo "Running pylint..."
          pylint --disable=all --enable=E main_kivy.py db_manager.py law_searcher.py || true
      
      - name: Run flake8
        continue-on-error: true
        run: |
          echo "Running flake8..."
          flake8 main_kivy.py db_manager.py law_searcher.py --count --show-source --statistics || true
      
      - name: Verify database
        run: |
          python << 'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('laws.db')
              cursor = conn.cursor()
              cursor.execute("SELECT COUNT(*) FROM laws")
              count = cursor.fetchone()[0]
              print(f"✅ Database OK: {count} records found")
              conn.close()
          except Exception as e:
              print(f"⚠️ Database check: {e}")
          EOF
      
      - name: Summary
        run: |
          echo "✅ Code quality check completed successfully"
          echo "📱 To build APK, run locally: buildozer android debug"
          echo "📦 APK artifacts available in Releases"
