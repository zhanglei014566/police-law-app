name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      ANDROID_HOME: ${{ runner.temp }}/android-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install OS packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            unzip wget curl git build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev python3-dev openjdk-11-jdk

      - name: Install Android command-line tools and SDK components
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT"
          # Download command-line tools (update URL if Google changes it)
          curl -sSfLo commandlinetools.zip "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          unzip -q commandlinetools.zip -d cmdline-tools
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/ || true
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-30" "build-tools;30.0.3" "ndk;23.1.7779620" || true
          echo "Android SDK installed to $ANDROID_SDK_ROOT"

      - name: Add SDK tools to PATH
        run: |
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Set up Python and pip
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36 buildozer==1.4.2 || pip install cython buildozer
          pip install setuptools wheel

      - name: Prepare buildozer (fetch requirements)
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "No buildozer.spec found in repo root; please add one or adjust workdir."
            exit 1
          fi
          buildozer --version

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK
        if: success() && always()
        uses: actions/upload-artifact@v4
        with:
          name: police-law-app-apk
          path: bin/*.apk